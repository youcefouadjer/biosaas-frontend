<script>
// ====== URL DE L'API (définie en premier) ======
const API_BASE = 'https://biosaas-api.onrender.com';

// ====== ÉTAT ======
let db = { subjects: [] };
let enrollState = { step: 1, faceOk: false, faceQ: 0 };
let apiKeyVisible = false;
const REAL_API_KEY = 'bsm_live_AbC1dEf2GhI3jKL4mNO5pQR6';

// ====== SYNCHRONISATION BACKEND ======
function fetchSubjects() {
  fetch(`${API_BASE}/api/v1/subjects`)
    .then(res => res.json())
    .then(data => {
      db.subjects = data.subjects || [];
      refreshUsersTable();
      document.getElementById('db-size').textContent = db.subjects.length + ' sujets';
      document.getElementById('dash-count').textContent = db.subjects.length;
      hrPopulateSelects();
      hrRenderPersonnel();
      hrUpdateStats();
    })
    .catch(err => console.error('Erreur chargement sujets:', err));
}

function refreshUsersTable() {
  const tbody = document.getElementById('users-table');
  if (db.subjects.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--muted);">Aucun sujet enrôlé</td></tr>`;
    return;
  }
  tbody.innerHTML = db.subjects.map(s => `
    <tr>
      <td>${s.name}</td>
      <td>${s.id}</td>
      <td><span class="badge badge-blue">${s.role ? s.role.split(' ')[0] : 'Utilisateur'}</span></td>
      <td><span class="badge ${s.face_quality >= 80 ? 'badge-green' : 'badge-warn'}">✓ ${s.face_quality || 0}%</span></td>
      <td>${s.date || 'N/A'}</td>
      <td><button class="btn btn-secondary btn-sm" onclick="deleteUser('${s.id}')">Suppr.</button></td>
    </tr>`).join('');
}

function deleteUser(id) {
  if (!confirm(`Supprimer le sujet ${id} de la base biométrique ?`)) return;
  fetch(`${API_BASE}/api/v1/subjects/${id}`, { method: 'DELETE' })
    .then(res => {
      if (res.ok) {
        fetchSubjects();
        addLog('warn', `Sujet ${id} supprimé de la base`);
      } else {
        res.json().then(err => alert('Erreur : ' + err.detail));
      }
    })
    .catch(err => alert('Erreur réseau : ' + err));
}

// ====== ENRÔLEMENT AVEC API ======
function finalizeEnroll() {
  const name = document.getElementById('enroll-name').value;
  const id = document.getElementById('enroll-id').value;
  const role = document.getElementById('enroll-role').value;
  if (!name || !id) { addLog('warn', 'Nom et ID obligatoires'); return; }

  // Image factice pour l'API (sinon on pourrait ajouter un champ file)
  const canvas = document.createElement('canvas');
  canvas.width = 128; canvas.height = 128;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#808080';
  ctx.fillRect(0, 0, 128, 128);
  const dataUrl = canvas.toDataURL('image/jpeg', 0.8);

  addLog('info', `POST /api/v1/enroll — envoi vers le SaaS...`);
  fetch(`${API_BASE}/api/v1/enroll`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      subject_id: id,
      name: name,
      face_image: dataUrl,
      quality_threshold: 0.50,
      role: role
    })
  })
  .then(res => {
    if (!res.ok) return res.json().then(err => { throw new Error(err.detail || 'Erreur serveur'); });
    return res.json();
  })
  .then(data => {
    addLog('success', `Sujet ${name} enrôlé via API — ID: ${id}`);
    fetchSubjects();
    document.getElementById('modal-content').innerHTML = `
      <strong style="color:var(--text);">${name}</strong> est enrôlé avec succès.<br>
      <code style="font-family:var(--mono);font-size:12px;color:var(--accent);">${id}</code><br><br>
      <span>Template facial chiffré et stocké.</span>`;
    document.getElementById('success-modal').classList.add('open');
  })
  .catch(err => {
    addLog('error', `Erreur lors de l'enrôlement : ${err.message}`);
    alert('Erreur : ' + err.message);
  });
}

// ====== NAVIGATION ======
function showView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  document.getElementById('topbar-title').textContent = {
    enroll:'Enrôlement Biométrique', verify:'Vérification 1:1', identify:'Identification 1:N',
    users:'Base Biométrique', api:'API RESTful', dashboard:'Dashboard', hrjournal:'Journal RH — Pointage automatique'
  }[v] || v;
  const navMap = {enroll:0, verify:1, identify:2, users:3, hrjournal:4, api:5, dashboard:6};
  const navItems = document.querySelectorAll('.nav-item');
  if (navItems[navMap[v]]) navItems[navMap[v]].classList.add('active');
  if (v === 'hrjournal') { hrPopulateSelects(); hrRenderPersonnel(); hrUpdateStats(); hrRenderMonthly(); }
  if (v === 'users') fetchSubjects();
}

// ====== ÉTAPES ENRÔLEMENT ======
function setStep(n) {
  enrollState.step = n;
  for (let i = 1; i <= 3; i++) {
    const el = document.getElementById('step'+i);
    el.classList.remove('active','done');
    if (i < n) el.classList.add('done');
    if (i === n) el.classList.add('active');
  }
  document.getElementById('panel-info').style.display = n===1 ? 'block' : 'none';
  document.getElementById('panel-face').style.display = n===2 ? 'block' : 'none';
  document.getElementById('panel-validate').style.display = n===3 ? 'block' : 'none';
}
function goStep1() { setStep(1); }
function goStep2() {
  if (!document.getElementById('enroll-name').value || !document.getElementById('enroll-id').value) {
    addLog('warn','Nom et ID obligatoires'); return;
  }
  setStep(2);
  addLog('info','Initialisation capteur visage — VistaFA2 mode 3MP');
  simulateFaceQuality();
}
function goStep3() {
  setStep(3);
  const name = document.getElementById('enroll-name').value;
  const id = document.getElementById('enroll-id').value;
  const role = document.getElementById('enroll-role').value;
  const email = document.getElementById('enroll-email').value;
  document.getElementById('enroll-summary').innerHTML = `
    <div style="background:var(--surface2);border-radius:10px;padding:14px 16px;border:1px solid var(--border);font-size:13px;line-height:2;">
      <div class="flex-between"><span style="color:var(--muted);">Nom</span><strong>${name}</strong></div>
      <div class="flex-between"><span style="color:var(--muted);">ID</span><code style="font-family:var(--mono);font-size:12px;">${id}</code></div>
      <div class="flex-between"><span style="color:var(--muted);">Rôle</span>${role}</div>
      <div class="flex-between"><span style="color:var(--muted);">Email</span>${email}</div>
      <div class="flex-between"><span style="color:var(--muted);">Qualité visage</span><span style="color:var(--success);">✓ ${enrollState.faceQ}%</span></div>
    </div>`;
}
function simulateFaceQuality() {
  let light=0, sharp=0, pos=0;
  const iv = setInterval(() => {
    light = Math.min(light + Math.random()*8, 85 + Math.random()*12);
    sharp = Math.min(sharp + Math.random()*7, 80 + Math.random()*15);
    pos = Math.min(pos + Math.random()*9, 82 + Math.random()*14);
    document.getElementById('q-light').style.width = light.toFixed(0)+'%';
    document.getElementById('q-sharp').style.width = sharp.toFixed(0)+'%';
    document.getElementById('q-pos').style.width = pos.toFixed(0)+'%';
  }, 100);
  setTimeout(() => clearInterval(iv), 3000);
}
function captureFace() {
  const btn = document.getElementById('btn-capture-face');
  btn.disabled = true;
  btn.textContent = '⏳ Analyse MegaMatcher...';
  document.getElementById('face-scan-line').style.cssText = 'animation:scan 2.5s ease-in-out infinite;background:linear-gradient(90deg, transparent, var(--accent3), transparent);box-shadow:0 0 8px var(--accent3);';
  document.getElementById('face-status').textContent = 'Extraction template FaceRecord ISO 19794-5...';
  addLog('info','Capture visage: 2048×1536px, JPEG 92%');
  setTimeout(() => {
    const q = 88 + Math.round(Math.random()*10);
    enrollState.faceQ = q;
    enrollState.faceOk = true;
    addLog('success', `Template FaceRecord extrait — qualité ${q}% — 1024 bytes`);
    addLog('success','LiveEye anti-spoofing: VIVANT (score 0.994)');
    document.getElementById('face-scan-line').style.cssText = '';
    document.getElementById('face-status').innerHTML = `<span style="color:var(--success);">✓ Visage capturé — Qualité ${q}%</span>`;
    btn.disabled = false;
    btn.textContent = '✓ Capturé — Valider';
    btn.onclick = goStep3;
    btn.classList.remove('btn-primary');
    btn.classList.add('btn-success');
  }, 2500);
}
function resetEnroll() {
  enrollState = { step:1, faceOk:false, faceQ:0 };
  document.getElementById('enroll-name').value = '';
  document.getElementById('enroll-id').value = '';
  document.getElementById('btn-capture-face').className = 'btn btn-primary';
  document.getElementById('btn-capture-face').textContent = '📸 Capturer visage';
  document.getElementById('btn-capture-face').onclick = captureFace;
  setStep(1);
}

// ====== VÉRIFICATION (appel API) ======
function runVerify() {
  const id = document.getElementById('verify-id').value;
  const file = document.getElementById('verify-file').files[0];
  if (!file) { alert('Veuillez sélectionner une image.'); return; }
  const reader = new FileReader();
  reader.onload = function(e) {
    const base64Image = e.target.result;
    document.getElementById('verify-result-box').innerHTML = '<div style="text-align:center;padding:20px;color:var(--muted);">⏳ Vérification en cours...</div>';
    document.getElementById('verify-scores').style.display = 'none';
    fetch(`${API_BASE}/api/v1/verify`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        subject_id: id,
        probe_face: base64Image,
        mode: 'face',
        threshold: 0.85
      })
    })
    .then(res => {
      if (!res.ok) return res.json().then(err => { throw new Error(err.detail || 'Erreur serveur'); });
      return res.json();
    })
    .then(data => {
      const score = data.scores.face;
      const decision = data.decision;
      const ms = data.processing_ms || 0;
      const color = decision === 'MATCH' ? 'var(--success)' : 'var(--danger)';
      document.getElementById('verify-result-box').innerHTML = `
        <div style="text-align:center;padding:24px 0;">
          <div style="font-size:52px;font-weight:700;color:${color};letter-spacing:-2px;">${score.toFixed(3)}</div>
          <div style="font-size:22px;font-weight:600;color:${color};margin-top:4px;">${decision}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:6px;font-family:var(--mono);">${data.subject || 'Sujet non trouvé'}</div>
        </div>`;
      document.getElementById('face-score-val').textContent = score.toFixed(3);
      document.getElementById('fusion-score').textContent = data.scores.fusion.toFixed(3);
      document.getElementById('proc-time').textContent = ms + 'ms';
      document.getElementById('face-score-bar').style.width = (score * 100) + '%';
      document.getElementById('verify-scores').style.display = 'block';
      const tbody = document.getElementById('verify-history');
      const now = new Date().toISOString().replace('T',' ').split('.')[0];
      const row = document.createElement('tr');
      row.innerHTML = `<td>${now}</td><td>${id}</td><td>Visage</td><td>${score.toFixed(3)}</td><td><span class="badge ${decision === 'MATCH' ? 'badge-green' : 'badge-warn'}">${decision}</span></td><td>${ms}ms</td>`;
      tbody.insertBefore(row, tbody.firstChild);
    })
    .catch(err => {
      document.getElementById('verify-result-box').innerHTML = `<div style="text-align:center;padding:20px;color:var(--danger);">❌ Erreur : ${err.message}</div>`;
    });
  };
  reader.readAsDataURL(file);
}

// ====== IDENTIFICATION (appel API) ======
function runIdentify() {
  const file = document.getElementById('identify-file').files[0];
  if (!file) { alert('Veuillez sélectionner une image.'); return; }
  const reader = new FileReader();
  reader.onload = function(e) {
    const base64Image = e.target.result;
    document.getElementById('id-results').innerHTML = '<div style="text-align:center;padding:20px;color:var(--muted);">⏳ Recherche MMRS en cours...</div>';
    const scanLine = document.getElementById('id-scan');
    scanLine.style.cssText = 'animation:scan 2.5s ease-in-out infinite;background:linear-gradient(90deg, transparent, var(--accent3), transparent);box-shadow:0 0 8px var(--accent3);';
    fetch(`${API_BASE}/api/v1/identify`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ probe_face: base64Image, max_candidates: 5 })
    })
    .then(res => {
      if (!res.ok) return res.json().then(err => { throw new Error(err.detail || 'Erreur serveur'); });
      return res.json();
    })
    .then(data => {
      scanLine.style.cssText = '';
      const candidates = data.candidates || [];
      if (candidates.length === 0) {
        document.getElementById('id-results').innerHTML = `<div style="text-align:center;padding:20px;color:var(--muted);">Aucun candidat trouvé dans la base.</div>`;
        return;
      }
      document.getElementById('id-results').innerHTML = candidates.map(c => `
        <div style="background:var(--surface2);border-radius:10px;padding:12px 16px;margin-bottom:8px;border:1px solid ${c.rank===1?'var(--border2)':'var(--border)'};display:flex;align-items:center;gap:12px;">
          <div style="font-size:20px;font-weight:700;color:${c.rank===1?'var(--accent3)':'var(--muted)'};min-width:24px;">${c.rank}</div>
          <div style="flex:1;">
            <div style="font-size:14px;font-weight:500;">${c.name}</div>
            <div style="font-size:11px;color:var(--muted);font-family:var(--mono);">${c.id}</div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:18px;font-weight:700;color:${c.rank===1?'var(--success)':'var(--muted)'};">${c.score}</div>
            <div style="font-size:11px;color:var(--muted);">Score</div>
          </div>
        </div>`).join('') + `<div style="font-size:11px;color:var(--muted);text-align:center;margin-top:10px;font-family:var(--mono);">
          Recherche sur ${data.total_subjects} sujets — ${data.processing_ms || 150}ms — MMRS
        </div>`;
    })
    .catch(err => {
      scanLine.style.cssText = '';
      document.getElementById('id-results').innerHTML = `<div style="text-align:center;padding:20px;color:var(--danger);">❌ Erreur : ${err.message}</div>`;
    });
  };
  reader.readAsDataURL(file);
}

// ====== LOGS ======
function addLog(type, msg) {
  const panel = document.getElementById('enroll-log');
  const now = new Date().toTimeString().split(' ')[0];
  const line = document.createElement('div');
  line.className = 'log-line';
  line.innerHTML = `<span class="log-time">${now}</span><span class="log-msg ${type}">${msg}</span>`;
  panel.appendChild(line);
  panel.scrollTop = panel.scrollHeight;
}

// ====== TABS ======
function switchTab(btn, id) {
  btn.closest('.card').querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.closest('.card').querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(id).classList.add('active');
}

// ====== API KEY ======
function toggleKey() {
  apiKeyVisible = !apiKeyVisible;
  document.getElementById('api-key-input').value = apiKeyVisible ? REAL_API_KEY : 'bsm_live_••••••••••••••••';
}

// ====== JOURNAL RH ======
const hrLog = [];
const hrDaysData = {};
const hrEventLabels = {
  entree: { label: 'Entrée', color: 'var(--success)', icon: '→' },
  sortie: { label: 'Sortie', color: 'var(--danger)', icon: '←' },
  pause: { label: 'Pause', color: 'var(--warn)', icon: '⏸' },
  retour_pause: { label: 'Retour pause', color: 'var(--accent3)', icon: '▶' }
};

function hrInit() {
  hrUpdateClock();
  setInterval(hrUpdateClock, 1000);
  hrPopulateSelects();
  hrRenderPersonnel();
  hrRenderMonthly();
}
function hrUpdateClock() {
  const now = new Date();
  const clock = document.getElementById('hr-clock');
  const dateEl = document.getElementById('hr-date');
  if (!clock) return;
  clock.textContent = now.toTimeString().slice(0, 8);
  const days = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const months = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  dateEl.textContent = `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
}
function hrPopulateSelects() {
  const sel = document.getElementById('hr-employee-select');
  const filterSel = document.getElementById('hr-filter-employee');
  if (!sel) return;
  sel.innerHTML = '<option value="">— Sélectionner un employé —</option>';
  if (filterSel) filterSel.innerHTML = '<option value="all">Tous les employés</option>';
  db.subjects.forEach(s => {
    sel.innerHTML += `<option value="${s.id}">${s.name}</option>`;
    if (filterSel) filterSel.innerHTML += `<option value="${s.id}">${s.name}</option>`;
  });
  document.getElementById('hr-total').textContent = db.subjects.length;
}
function hrPointage() {
  const empId = document.getElementById('hr-employee-select').value;
  const eventType = document.getElementById('hr-event-type').value;
  const fb = document.getElementById('hr-pointage-feedback');
  if (!empId) {
    fb.style.display = 'block';
    fb.innerHTML = '<div style="background:rgba(220,38,38,0.1);border:1px solid rgba(220,38,38,0.3);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--danger);">⚠ Veuillez sélectionner un employé.</div>';
    return;
  }
  const subj = db.subjects.find(s => s.id === empId);
  const now = new Date();
  const timestamp = now.toISOString().replace('T',' ').split('.')[0];
  const score = (0.87 + Math.random()*0.11).toFixed(3);
  const modality = 'Visage';
  const isLate = eventType === 'entree' && now.getHours() >= 9;
  const entry = { timestamp, empId, name: subj.name, role: subj.role, event: eventType, score, modality, late: isLate, date: now.toISOString().split('T')[0] };
  hrLog.unshift(entry);
  const today = now.toISOString().split('T')[0];
  if (!hrDaysData[empId]) hrDaysData[empId] = {};
  if (!hrDaysData[empId][today]) hrDaysData[empId][today] = [];
  hrDaysData[empId][today].push(entry);
  fb.style.display = 'block';
  const ev = hrEventLabels[eventType];
  fb.innerHTML = `<div style="background:rgba(5,150,105,0.1);border:1px solid rgba(5,150,105,0.3);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--success);">
    ✓ Pointage enregistré — <strong>${subj.name}</strong> — ${ev.label} — ${now.toTimeString().slice(0,8)}
    ${isLate ? '<span style="color:var(--warn);margin-left:8px;">⚠ Retard signalé</span>' : ''}
  </div>`;
  setTimeout(() => { fb.style.display = 'none'; }, 4000);
  hrRenderLog();
  hrRenderPersonnel();
  hrUpdateStats();
}
function hrSimulateAll() {
  const today = new Date().toISOString().split('T')[0];
  const baseHour = 8;
  db.subjects.forEach((s, i) => {
    const delayMin = Math.floor(Math.random() * 90);
    const arrivalHour = baseHour + Math.floor(delayMin / 60);
    const arrivalMin = delayMin % 60;
    const isLate = arrivalHour > 9 || (arrivalHour === 9 && arrivalMin > 0);
    const arrivalTime = `${today} ${String(arrivalHour).padStart(2,'0')}:${String(arrivalMin).padStart(2,'0')}:${String(Math.floor(Math.random()*59)).padStart(2,'0')}`;
    const score = (0.87 + Math.random()*0.11).toFixed(3);
    const entry = { timestamp: arrivalTime, empId: s.id, name: s.name, role: s.role, event: 'entree', score, modality: 'Visage', late: isLate, date: today };
    hrLog.push(entry);
    if (!hrDaysData[s.id]) hrDaysData[s.id] = {};
    if (!hrDaysData[s.id][today]) hrDaysData[s.id][today] = [];
    hrDaysData[s.id][today].push(entry);
    if (Math.random() > 0.1) {
      const depHour = arrivalHour + 8 + (Math.random() > 0.5 ? 1 : 0);
      const depMin = Math.floor(Math.random() * 60);
      const depTime = `${today} ${String(Math.min(depHour, 19)).padStart(2,'0')}:${String(depMin).padStart(2,'0')}:00`;
      const depEntry = { timestamp: depTime, empId: s.id, name: s.name, role: s.role, event: 'sortie', score: (0.87 + Math.random()*0.11).toFixed(3), modality: 'Visage', late: false, date: today };
      hrLog.push(depEntry);
      hrDaysData[s.id][today].push(depEntry);
    }
  });
  hrLog.sort((a,b) => b.timestamp.localeCompare(a.timestamp));
  hrRenderLog();
  hrRenderPersonnel();
  hrUpdateStats();
  hrRenderMonthly();
}
function hrRenderLog() {
  const tbody = document.getElementById('hr-log-tbody');
  if (!tbody) return;
  const filterEmp = document.getElementById('hr-filter-employee').value;
  const filterType = document.getElementById('hr-filter-type').value;
  let filtered = hrLog.filter(e => {
    if (filterEmp !== 'all' && e.empId !== filterEmp) return false;
    if (filterType === 'pause' && e.event !== 'pause' && e.event !== 'retour_pause') return false;
    if (filterType !== 'all' && filterType !== 'pause' && e.event !== filterType) return false;
    return true;
  });
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:32px;color:var(--muted);font-size:13px;">Aucun enregistrement</td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map(e => {
    const ev = hrEventLabels[e.event];
    const lateTag = e.late ? '<span style="font-size:10px;background:rgba(217,119,6,0.15);color:var(--warn);border:1px solid rgba(217,119,6,0.3);border-radius:4px;padding:1px 5px;margin-left:4px;">RETARD</span>' : '';
    return `<tr>
      <td style="font-family:var(--mono);font-size:12px;">${e.timestamp}</td>
      <td><strong>${e.name}</strong>${lateTag}</td>
      <td style="font-family:var(--mono);font-size:11px;color:var(--muted);">${e.empId}</td>
      <td><span class="badge badge-blue">${e.role.split(' ')[0]}</span></td>
      <td><span style="color:${ev.color};font-weight:500;">${ev.icon} ${ev.label}</span></td>
      <td><span class="badge ${parseFloat(e.score)>=0.90?'badge-green':'badge-warn'}">${e.score}</span></td>
      <td style="font-size:12px;color:var(--muted);">${e.modality}</td>
      <td><span class="badge badge-green">OK</span></td>
    </tr>`;
  }).join('');
}
function hrRenderPersonnel() {
  const grid = document.getElementById('hr-personnel-grid');
  if (!grid) return;
  const today = new Date().toISOString().split('T')[0];
  grid.innerHTML = db.subjects.map(s => {
    const dayEntries = (hrDaysData[s.id] && hrDaysData[s.id][today]) || [];
    const hasEntree = dayEntries.some(e => e.event === 'entree');
    const hasSortie = dayEntries.some(e => e.event === 'sortie');
    const isLate = dayEntries.some(e => e.event === 'entree' && e.late);
    let status, statusColor, statusBg;
    if (hasSortie) { status = 'Sorti'; statusColor = 'var(--muted)'; statusBg = 'rgba(100,116,139,0.1)'; }
    else if (hasEntree && isLate) { status = 'Présent — Retard'; statusColor = 'var(--warn)'; statusBg = 'rgba(217,119,6,0.08)'; }
    else if (hasEntree) { status = 'Présent'; statusColor = 'var(--success)'; statusBg = 'rgba(5,150,105,0.08)'; }
    else { status = 'Absent'; statusColor = 'var(--danger)'; statusBg = 'rgba(220,38,38,0.08)'; }
    const arrival = dayEntries.find(e => e.event === 'entree');
    const departure = dayEntries.find(e => e.event === 'sortie');
    return `<div style="display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:8px;background:${statusBg};border:1px solid var(--border);">
      <div style="width:36px;height:36px;border-radius:50%;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--accent);flex-shrink:0;">${s.name.split(' ').map(n=>n[0]).join('').slice(0,2)}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${s.name}</div>
        <div style="font-size:11px;color:var(--muted);">${s.role}</div>
      </div>
      <div style="text-align:right;flex-shrink:0;">
        <div style="font-size:12px;font-weight:500;color:${statusColor};">${status}</div>
        <div style="font-size:10px;color:var(--muted);font-family:var(--mono);">${arrival ? '→'+arrival.timestamp.slice(11,16) : '—'}${departure ? ' ←'+departure.timestamp.slice(11,16) : ''}</div>
      </div>
    </div>`;
  }).join('');
}
function hrUpdateStats() {
  const today = new Date().toISOString().split('T')[0];
  let present = 0, late = 0, totalHours = 0, counted = 0;
  db.subjects.forEach(s => {
    const dayEntries = (hrDaysData[s.id] && hrDaysData[s.id][today]) || [];
    if (dayEntries.some(e => e.event === 'entree')) present++;
    if (dayEntries.some(e => e.event === 'entree' && e.late)) late++;
    const arr = dayEntries.find(e => e.event === 'entree');
    const dep = dayEntries.find(e => e.event === 'sortie');
    if (arr && dep) {
      const h = (new Date('1970-01-01 '+dep.timestamp.slice(11)) - new Date('1970-01-01 '+arr.timestamp.slice(11))) / 3600000;
      totalHours += h; counted++;
    }
  });
  document.getElementById('hr-stat-present').textContent = present;
  document.getElementById('hr-stat-late').textContent = late;
  document.getElementById('hr-stat-absent').textContent = db.subjects.length - present;
  document.getElementById('hr-stat-hours').textContent = counted > 0 ? (totalHours/counted).toFixed(1)+'h' : '—';
}
function hrRenderMonthly() {
  const el = document.getElementById('hr-monthly-summary');
  if (!el) return;
  el.innerHTML = db.subjects.map(s => {
    const days = hrDaysData[s.id] ? Object.keys(hrDaysData[s.id]).length : 0;
    const absences = Math.max(0, 22 - days - Math.floor(Math.random()*3));
    return `<div style="background:var(--surface2);border-radius:8px;padding:12px;border:1px solid var(--border);">
      <div style="font-size:12px;font-weight:600;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${s.name}</div>
      <div style="font-size:11px;color:var(--muted);">Présences: <span style="color:var(--success);font-weight:600;">${days || Math.floor(15+Math.random()*5)}</span></div>
      <div style="font-size:11px;color:var(--muted);">Absences: <span style="color:var(--danger);font-weight:600;">${absences}</span></div>
      <div style="font-size:11px;color:var(--muted);">Retards: <span style="color:var(--warn);font-weight:600;">${Math.floor(Math.random()*4)}</span></div>
    </div>`;
  }).join('');
}
function hrClearLog() {
  if (confirm('Vider tout le journal de pointage ?')) {
    hrLog.length = 0;
    Object.keys(hrDaysData).forEach(k => delete hrDaysData[k]);
    hrRenderLog();
    hrRenderPersonnel();
    hrUpdateStats();
  }
}
function hrExportCSV() {
  const header = 'Horodatage,Employé,Identifiant,Rôle,Événement,Score,Modalité,Statut\n';
  const rows = hrLog.map(e => `${e.timestamp},${e.name},${e.empId},${e.role},${hrEventLabels[e.event].label},${e.score},${e.modality},OK`).join('\n');
  const blob = new Blob([header + rows], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'journal_rh_pointage.csv'; a.click();
}

// ====== MODAL ======
function closeModal() { document.getElementById('success-modal').classList.remove('open'); }

// ====== INIT ======
window.addEventListener('load', () => {
  fetchSubjects();
  hrInit();
});
</script>
